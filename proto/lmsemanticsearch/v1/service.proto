syntax = "proto3";

package lmsemanticsearch.v1;

option go_package = "goodkind.io/lm-semantic-search/gen/go/lmsemanticsearch/v1;lmsemanticsearchv1";

import "google/protobuf/timestamp.proto";

service SemanticSearchDaemonService {
  rpc Version(VersionRequest) returns (VersionResponse);
  rpc StartIndex(StartIndexRequest) returns (StartIndexResponse);
  rpc ClearIndex(ClearIndexRequest) returns (ClearIndexResponse);
  rpc CancelJob(CancelJobRequest) returns (CancelJobResponse);
  rpc SyncIndex(SyncIndexRequest) returns (SyncIndexResponse);
  rpc GetIndex(GetIndexRequest) returns (GetIndexResponse);
  rpc ListIndexes(ListIndexesRequest) returns (ListIndexesResponse);
  rpc GetJob(GetJobRequest) returns (GetJobResponse);
  rpc ListJobs(ListJobsRequest) returns (ListJobsResponse);
  rpc WatchJobs(WatchJobsRequest) returns (stream WatchJobsResponse);
  rpc SearchCode(SearchCodeRequest) returns (SearchCodeResponse);
  rpc GraphTool(GraphToolRequest) returns (GraphToolResponse);
  rpc RegisterConversationCollection(RegisterConversationCollectionRequest) returns (RegisterConversationCollectionResponse);
  rpc SyncConversationManifest(SyncConversationManifestRequest) returns (SyncConversationManifestResponse);
  // UpsertConversationDocumentsStream is the client-streaming conversation
  // upsert. clyde sends one header chunk, then document chunks, then one manifest
  // chunk, so the document set and manifest are not bounded by the gRPC max
  // message size. The engine accumulates the chunks and queues an async ingest
  // job.
  rpc UpsertConversationDocumentsStream(stream UpsertConversationDocumentsChunk) returns (UpsertConversationDocumentsResponse);
  // BackfillConversationScalars is the client-streaming conversation scalar
  // backfill. clyde sends one header chunk, then enrichment entry chunks, so the
  // conversation id to workspace root map is not bounded by the gRPC max message
  // size. The engine writes only empty scalar columns and returns row counts.
  rpc BackfillConversationScalars(stream BackfillConversationScalarsChunk) returns (BackfillConversationScalarsResponse);
  rpc DeleteConversation(DeleteConversationRequest) returns (DeleteConversationResponse);
  rpc SearchConversations(SearchConversationsRequest) returns (SearchConversationsResponse);
  rpc SearchWithinConversation(SearchWithinConversationRequest) returns (SearchWithinConversationResponse);
  rpc Doctor(DoctorRequest) returns (DoctorResponse);
  rpc Shutdown(ShutdownRequest) returns (ShutdownResponse);
}

message VersionRequest {}

message VersionResponse {
  string version = 1;
  string commit = 2;
  string build_time = 3;
}

message ClientInfo {
  string name = 1;
  int32 pid = 2;
  // caller_cwd is the absolute working directory of the calling process.
  // The daemon resolves a relative request path against it; a relative
  // path with no caller_cwd is rejected, because the daemon's own working
  // directory is never the caller's.
  string caller_cwd = 3;
}

message SplitterConfig {
  string type = 1;
  int32 chunk_size = 2;
  int32 overlap = 3;
}

message IndexConfig {
  string splitter_type = 1;
  int32 splitter_chunk_size = 2;
  int32 splitter_overlap = 3;
  repeated string ignore_patterns = 4;
  string ignore_digest = 5;
  string embedding_provider = 6;
  string embedding_model = 7;
  int32 embedding_dimension = 8;
  string vector_backend = 9;
  bool hybrid = 10;
  repeated string include_submodules = 11;
}

message Progress {
  string phase = 1;
  double phase_percent = 2;
  double overall_percent = 3;
  int32 files_total = 4;
  int32 files_processed = 5;
  int32 chunks_generated = 6;
  int32 embedding_batches_total = 7;
  int32 embedding_batches_completed = 8;
  int32 collection_rows_written = 9;
  google.protobuf.Timestamp last_event_at = 10;
  google.protobuf.Timestamp heartbeat_at = 11;
  // chunks_reused counts chunks served from an already-embedded vector this run,
  // distinct from chunks_generated (embedded this run), so total = reused +
  // embedded is visible on the wire.
  int32 chunks_reused = 12;
  // unit is the human progress noun for the counted items: "file" for a code
  // index and "document" for a conversation index. Empty reads as "file".
  string unit = 13;
  // breakdown is the resolved file-and-chunk outcome tree, the same structured
  // value every surface renders, so JSON consumers get the exact tree without
  // parsing the human text. Its file rows sum to processed.
  OutcomeBreakdown breakdown = 14;
  // chunks_processed counts chunks produced during this run.
  int32 chunks_processed = 15;
  // chunks_embedded counts chunks sent to the embedder during this run.
  int32 chunks_embedded = 16;
  // reuse_vectors_loaded counts old vectors loaded as reuse candidates during this run.
  int32 reuse_vectors_loaded = 17;
}

// OutcomeKind is the semantic identity of one outcome row. The render layer maps
// a kind to its glyph and label, so the kind is the wire-safe representation.
enum OutcomeKind {
  OUTCOME_KIND_UNSPECIFIED = 0;
  OUTCOME_KIND_EMBEDDED = 1;
  OUTCOME_KIND_UNCHANGED = 2;
  OUTCOME_KIND_REMOVED = 3;
  OUTCOME_KIND_PENDING = 4;
  OUTCOME_KIND_OVERSIZE = 5;
  OUTCOME_KIND_UNREADABLE = 6;
  OUTCOME_KIND_ADDED = 7;
  OUTCOME_KIND_REUSED = 8;
}

// OutcomeRow is one child line in an outcome tree: a semantic kind and a count.
message OutcomeRow {
  OutcomeKind kind = 1;
  int32 count = 2;
}

// OutcomeBreakdown mirrors view.OutcomeBreakdown: the resolved tree shared by
// every surface. scope_label is the resolved "N of M ..." denominator text;
// file_rows always sum to processed.
message OutcomeBreakdown {
  string scope_label = 1;
  int32 processed = 2;
  int32 scope_total = 3;
  repeated OutcomeRow file_rows = 4;
  int32 chunks_total = 5;
  repeated OutcomeRow chunk_rows = 6;
}

message JobError {
  string message = 1;
  bool retryable = 2;
  string code = 3;
}

// DependencyHealth reports the daemon's view of shared-infrastructure health
// (the embedding pipeline and the vector store). It is one global fact, not a
// per-codebase value, observed from job outcomes rather than a live probe. When
// degraded is true a hard outage is in effect and the human surfaces show a
// banner; mode names which one. Timestamps are UTC on the wire.
message DependencyHealth {
  bool degraded = 1;
  // mode is the degraded condition: "embedder_unreachable", "embedder_rejected",
  // "store_unavailable", or empty when healthy.
  string mode = 2;
  google.protobuf.Timestamp since = 3;
  google.protobuf.Timestamp last_healthy_at = 4;
}

message IndexRunSummary {
  int32 indexed_files = 1;
  int32 total_chunks = 2;
  string status = 3;
  google.protobuf.Timestamp completed_at = 4;
  repeated string skipped_files = 5;
  int64 total_bytes = 6;
}

message IndexRunFailure {
  string message = 1;
  int32 last_attempted_percentage = 2;
  google.protobuf.Timestamp failed_at = 3;
  string code = 4;
}

message Codebase {
  reserved 3;
  reserved "aliases";
  string id = 1;
  string canonical_path = 2;
  string status = 4;
  string active_job_id = 5;
  IndexRunSummary last_successful_run = 6;
  IndexRunFailure last_failed_run = 7;
  IndexConfig effective_config = 8;
  string collection_name = 9;
  repeated string legacy_collection_names = 10;
  string merkle_snapshot_path = 11;
  google.protobuf.Timestamp updated_at = 12;
  bool inode_tracking_disabled = 13;
  // display_status is the daemon-computed presentation status (preparing,
  // indexing, indexed, stale, failed) that every surface renders. It folds the
  // live job into the lifecycle status; status (field 4) stays the raw
  // lifecycle value for debugging.
  string display_status = 14;
  // glyph_token is the daemon-owned shape per display status (for example ⋯ for
  // waiting), so list rows render one vocabulary instead of each client owning a
  // map. status_label is the human word per display status.
  string glyph_token = 15;
  string status_label = 16;
  // reuse_sibling_count is the number of indexed sibling worktree collections a
  // discovered (not-yet-built) worktree will reuse on its deferred build. It is
  // zero for every other state and lets a list row show that a pending build is
  // cheap.
  int32 reuse_sibling_count = 17;
  // active_progress carries the live job's progress (including its breakdown)
  // for a codebase that is currently indexing, so the list and the TUI render
  // the same per-row tree the status surface shows. Nil when there is no active
  // job.
  Progress active_progress = 18;
}

message Job {
  string id = 1;
  string codebase_id = 2;
  string requested_path = 3;
  string canonical_path = 4;
  ClientInfo client = 5;
  string operation = 6;
  string state = 7;
  Progress progress = 8;
  IndexConfig config = 9;
  google.protobuf.Timestamp started_at = 10;
  google.protobuf.Timestamp updated_at = 11;
  google.protobuf.Timestamp completed_at = 12;
  JobError error = 13;
  // forced records that the caller passed force=true on the index request.
  bool forced = 14;
  // trigger names what started the run ("initial_build", "forced_reindex", or
  // "changed_files"), derived from the operation and the force flag.
  string trigger = 15;
  // display_state is the daemon-resolved presentation label for the job (for
  // example "failed (retryable)"), the authoritative status every surface
  // renders. state (field 7) stays the raw lifecycle value for machine parsing.
  string display_state = 16;
  // display_error is the resolved error line a surface shows beneath the job, or
  // empty when the job has no error or a degraded-dependency banner already
  // carries the cause. error (field 13) stays the raw error for machine parsing.
  string display_error = 17;
  // superseded reports a failed job overtaken by a later terminal job for the
  // same codebase. The daemon resolves it at the boundary, so machine consumers
  // read the same fact the human surfaces do. state (field 7) stays raw.
  bool superseded = 18;
  // superseded_by_job_id is the id of the immediate next terminal job for this
  // job's codebase when superseded, else empty.
  string superseded_by_job_id = 19;
  // outcome is the daemon-resolved terminal result: "succeeded", "failed", or
  // "canceled", and empty while the job is still live. Machine consumers read
  // this instead of deriving terminality from the raw state field.
  string outcome = 20;
}

message SearchResult {
  string relative_path = 1;
  int32 start_line = 2;
  int32 end_line = 3;
  string language = 4;
  double score = 5;
  string content = 6;
}

message ConversationDocument {
  string conversation_id = 1;
  int32 message_index = 2;
  string role = 3;
  int64 timestamp_unix = 4;
  string text = 5;
  // parent_conversation_id names the conversation this one forked from, so the
  // index can group a fork with its parent. Empty when the conversation has no
  // parent.
  string parent_conversation_id = 6;
  // workspace_root is the workspace the conversation belongs to, stored as a
  // native scalar column so a search can filter by it. clyde owns the value;
  // empty when unknown. provider is derived from the conversation_id prefix and
  // is not carried here.
  string workspace_root = 7;
  // archived marks a conversation hidden from normal clyde lists. clyde owns
  // this value, and it defaults false when unset.
  bool archived = 8;
}

message ConversationSearchResult {
  string conversation_id = 1;
  int32 message_index = 2;
  string role = 3;
  int64 timestamp_unix = 4;
  double score = 5;
  string content = 6;
  // parent_conversation_id names the conversation this one forked from, carried
  // through from the indexed document. Empty when the conversation has no parent.
  string parent_conversation_id = 7;
}

message StartIndexRequest {
  string path = 1;
  bool force = 2;
  SplitterConfig splitter = 3;
  repeated string ignore_patterns = 4;
  ClientInfo client = 5;
  repeated string include_submodules = 6;
  int32 max_job_chunks = 7;
  int64 max_job_bytes = 8;
}

message StartIndexResponse {
  string job_id = 1;
  string codebase_id = 2;
  string state = 3;
  bool deduplicated = 4;
  string canonical_path = 5;
  string display_text = 6;
  // overlaps_codebase_id names the existing codebase whose canonical path
  // strictly prefix-covers this registration. Empty when there is no
  // overlap. Used by the daemon to surface the overlap hint to the caller.
  string overlaps_codebase_id = 7;
}

message ClearIndexRequest {
  string path = 1;
  ClientInfo client = 2;
}

message ClearIndexResponse {
  string codebase_id = 1;
  bool cleared = 2;
  string display_text = 3;
}

message CancelJobRequest {
  string job_id = 1;
  ClientInfo client = 2;
}

message CancelJobResponse {
  string job_id = 1;
  bool cancelled = 2;
  string display_text = 3;
}

message SyncIndexRequest {
  string path = 1;
  ClientInfo client = 2;
}

message SyncIndexResponse {
  string job_id = 1;
  string codebase_id = 2;
  string state = 3;
  string display_text = 4;
}

message GetIndexRequest {
  string path = 1;
  ClientInfo client = 2;
}

message GetIndexResponse {
  Codebase codebase = 1;
  Job active_job = 2;
  bool tracked = 3;
  string display_text = 4;
  PathClassification classification = 5;
  DependencyHealth dependency_health = 6;
  // Searchable is true only when the path is indexed AND the search backend
  // (store and embedder) answered a liveness probe at status time. It is the
  // single signal a caller should use to decide whether search_code can serve
  // this path right now; classification.kind alone reflects only the on-disk
  // index and stays KIND_IN_SCOPE_INDEXED even when the backend is unreachable.
  bool searchable = 7;
  // CollectionReadiness is the per-path readiness of this codebase's own Milvus
  // collection, distinct from dependency_health (a global fact). One of "",
  // "absent", "building", "loading", "ready", or "unknown". A not-ready
  // collection here means this codebase is still indexing or its collection is
  // loading; it is never a global store outage, which dependency_health reports.
  string collection_readiness = 8;
}

// PathClassification reports how the daemon sees one queried path with
// respect to the codebases it tracks. Kind reports the overall outcome.
// Excluded_by_pattern and excluded_by_gitignore are populated when the path
// is in scope but masked by an ignore rule. Covering_codebase_id names the
// longest-prefix covering codebase, when any.
message PathClassification {
  enum Kind {
    KIND_UNSPECIFIED = 0;
    KIND_IN_SCOPE_INDEXED = 1;
    KIND_IN_SCOPE_EXCLUDED = 2;
    KIND_IN_SCOPE_UNINDEXED = 3;
    KIND_OUT_OF_SCOPE = 4;
  }
  Kind kind = 1;
  string excluded_by_pattern = 2;
  string excluded_by_gitignore = 3;
  string covering_codebase_id = 4;
}

message ListIndexesRequest {}

message ListIndexesResponse {
  repeated Codebase indexes = 1;
  string display_text = 2;
  DependencyHealth dependency_health = 3;
}

message GetJobRequest {
  string job_id = 1;
}

message GetJobResponse {
  Job job = 1;
  string display_text = 2;
  DependencyHealth dependency_health = 3;
}

message ListJobsRequest {
  string codebase_id = 1;
}

message ListJobsResponse {
  repeated Job jobs = 1;
  string display_text = 2;
  DependencyHealth dependency_health = 3;
}

message WatchJobsRequest {
  repeated string job_ids = 1;
}

message WatchJobsResponse {
  Job job = 1;
}

message SearchCodeRequest {
  string path = 1;
  string query = 2;
  int32 limit = 3;
  repeated string extension_filter = 4;
  ClientInfo client = 5;
}

message SearchCodeResponse {
  repeated SearchResult results = 1;
  Codebase codebase = 2;
  Job active_job = 3;
  string display_text = 4;
  DependencyHealth dependency_health = 5;
}

message GraphToolRequest {
  string path = 1;
  ClientInfo client = 2;
  string tool_name = 3;
  string args_json = 4;
}

message GraphToolResponse {
  string result_json = 1;
  string display_text = 2;
}

message RegisterConversationCollectionRequest {
  string collection_id = 1;
  ClientInfo client = 2;
}

message RegisterConversationCollectionResponse {
  string codebase_id = 1;
  string collection_name = 2;
  string display_text = 3;
}

// ConversationFingerprint is one conversation id paired with a content
// fingerprint that changes whenever the conversation's messages change. clyde
// computes it per conversation; the engine compares it against the stored
// checkpoint to decide which conversations to re-embed.
message ConversationFingerprint {
  string conversation_id = 1;
  string fingerprint = 2;
}

// ConversationReconcileMode declares how the engine treats a conversation the
// upsert manifest omits. RETAIN keeps it and its rows (additive-only); the
// explicit DeleteConversation RPC is then the only path that removes a
// conversation. AUTHORITATIVE deletes it, gated by the large-delete quarantine.
// UNSPECIFIED is treated as RETAIN, so a caller that sets nothing never triggers
// a mass delete on a transient short manifest.
enum ConversationReconcileMode {
  CONVERSATION_RECONCILE_MODE_UNSPECIFIED = 0;
  CONVERSATION_RECONCILE_MODE_RETAIN = 1;
  CONVERSATION_RECONCILE_MODE_AUTHORITATIVE = 2;
}

message SyncConversationManifestRequest {
  string collection_id = 1;
  // manifest lists every current conversation with its content fingerprint, so
  // the engine can diff against its checkpoint and reply with the ids it needs.
  repeated ConversationFingerprint manifest = 2;
  ClientInfo client = 3;
}

message SyncConversationManifestResponse {
  // needed_conversation_ids names the conversations new or changed since the
  // last ingest. clyde sends documents for only these.
  repeated string needed_conversation_ids = 1;
  string display_text = 2;
}

message UpsertConversationDocumentsResponse {
  string job_id = 1;
  string display_text = 2;
}

// UpsertConversationDocumentsHeader opens a streamed upsert. It carries the
// collection id, the caller info, and the reconcile mode once, before any
// documents. reconcile_mode declares whether a conversation the manifest omits
// is retained or deleted; it defaults to RETAIN when unset.
message UpsertConversationDocumentsHeader {
  string collection_id = 1;
  ClientInfo client = 2;
  ConversationReconcileMode reconcile_mode = 3;
}

// UpsertConversationDocumentsDocuments is one batch of documents in a streamed
// upsert. The engine concatenates the documents from every documents chunk in
// receive order into the full document set.
message UpsertConversationDocumentsDocuments {
  repeated ConversationDocument documents = 1;
}

// UpsertConversationDocumentsManifest carries the full current conversation set
// with fingerprints. The header's reconcile_mode governs what happens to a
// conversation the manifest omits (default RETAIN keeps it); the manifest is
// sent whole as one chunk under the per-chunk size bound rather than split.
message UpsertConversationDocumentsManifest {
  repeated ConversationFingerprint manifest = 1;
}

// UpsertConversationDocumentsChunk is one frame of a streamed upsert: a header,
// a batch of documents, or the manifest. The stream sends exactly one header
// first, then zero or more documents chunks, then exactly one manifest chunk.
message UpsertConversationDocumentsChunk {
  oneof chunk {
    UpsertConversationDocumentsHeader header = 1;
    UpsertConversationDocumentsDocuments documents = 2;
    UpsertConversationDocumentsManifest manifest = 3;
  }
}

// BackfillConversationScalarsChunk is one frame of a streamed scalar backfill:
// a header or a batch of enrichment entries. The stream sends exactly one header
// first, then zero or more entries chunks.
message BackfillConversationScalarsChunk {
  oneof chunk {
    BackfillConversationScalarsHeader header = 1;
    BackfillConversationScalarsEntries entries = 2;
  }
}

// BackfillConversationScalarsHeader opens a streamed scalar backfill. It
// carries the collection id, dry-run flag, and caller info once, before any
// entries.
message BackfillConversationScalarsHeader {
  string collection_id = 1;
  bool dry_run = 2;
  ClientInfo client = 3;
}

// BackfillConversationScalarsEntries is one batch of conversation scalar
// enrichment entries in a streamed scalar backfill.
message BackfillConversationScalarsEntries {
  repeated BackfillConversationScalarEntry entries = 1;
}

// BackfillConversationScalarEntry maps one conversation id to the workspace root
// and archived status that clyde observed for that conversation.
message BackfillConversationScalarEntry {
  string conversation_id = 1;
  string workspace_root = 2;
  bool archived = 3;
}

// BackfillConversationScalarsResponse reports the scalar backfill result.
message BackfillConversationScalarsResponse {
  int64 changed = 1;
  int64 orphan = 2;
  string display_text = 3;
}

message DeleteConversationRequest {
  string collection_id = 1;
  string conversation_id = 2;
  ClientInfo client = 3;
}

message DeleteConversationResponse {
  string job_id = 1;
  string display_text = 2;
}

// ConversationSearchFilter narrows conversation retrieval by row attributes.
// Every field is optional; an empty filter matches everything. conversation_ids
// pushes into the vector store as path-prefix expressions; the other fields
// apply to the decoded row metadata after retrieval.
message ConversationSearchFilter {
  // roles keeps only hits whose message role is in the set, e.g. "user".
  repeated string roles = 1;
  // from_unix / until_unix bound the message timestamp (inclusive from,
  // exclusive until). Zero means unbounded.
  int64 from_unix = 2;
  int64 until_unix = 3;
  // conversation_ids restricts retrieval to these conversations. clyde resolves
  // record-level scopes (provider, workspace, archived) into this set.
  repeated string conversation_ids = 4;
  // parent_conversation_id keeps only hits whose conversation forked from this
  // parent, selecting a fork family.
  string parent_conversation_id = 5;
  // min_score drops hits scoring below the floor. Zero means no floor.
  double min_score = 6;
  // message_index_from / message_index_until bound the message index
  // (inclusive from, exclusive until). until zero means unbounded.
  int32 message_index_from = 7;
  int32 message_index_until = 8;
  // providers keeps only hits whose provider is in the set, e.g. "claude".
  // Filtered natively on the provider scalar column.
  repeated string providers = 9;
  // workspace_roots keeps only hits whose workspace_root is in the set. clyde
  // resolves a workspace prefix filter into the small set of matching roots
  // (one value per workspace directory) so the engine does an exact IN.
  repeated string workspace_roots = 10;
  // archived, when set, keeps only hits whose archived column equals the value.
  // It filters the nullable archived scalar, so a row whose archived is still
  // NULL (an old row the enrichment backfill has not reached) is excluded by
  // either value; clyde should send it only after the backfill populates
  // archived across the corpus.
  optional bool archived = 11;
}

message SearchConversationsRequest {
  string collection_id = 1;
  string query = 2;
  int32 limit = 3;
  ConversationSearchFilter filter = 4;
  // per_conversation_limit caps hits per conversation so one large transcript
  // does not monopolize the result list. Zero means uncapped.
  int32 per_conversation_limit = 5;
}

message SearchConversationsResponse {
  repeated ConversationSearchResult results = 1;
  string display_text = 2;
  DependencyHealth dependency_health = 3;
}

message SearchWithinConversationRequest {
  string collection_id = 1;
  // conversation_id scopes retrieval to one conversation and is required.
  string conversation_id = 2;
  string query = 3;
  int32 limit = 4;
  ConversationSearchFilter filter = 5;
}

message SearchWithinConversationResponse {
  repeated ConversationSearchResult results = 1;
  // indexed_fingerprint is the content fingerprint the engine has embedded for
  // this conversation, from its checkpoint. Empty means the conversation is not
  // indexed. A caller compares it to the conversation's current fingerprint to
  // decide whether the hits are complete or a literal scan of newer content is
  // needed.
  string indexed_fingerprint = 2;
  string display_text = 3;
  DependencyHealth dependency_health = 4;
}

message Diagnostic {
  string severity = 1;
  string code = 2;
  string summary = 3;
  string detail = 4;
}

message DoctorRequest {}

message DoctorResponse {
  repeated Diagnostic diagnostics = 1;
  string display_text = 2;
}

message ShutdownRequest {}

message ShutdownResponse {
  bool accepted = 1;
}
