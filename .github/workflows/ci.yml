name: CI
on:
  push:
    branches: ['**']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  go:
    uses: agoodkind/go-makefile/.github/workflows/_ci.yml@main
    permissions:
      contents: read
      id-token: write
    with:
      # dart/swift tree-sitter grammar sources live in submodules; the build
      # generates the Swift parser from them.
      submodules: recursive
